name: Project Snapshot for LLM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y tree jq

      - name: Generate tree.json
        run: tree -I '.git|node_modules|dist|build|*.log' -a -J > tree.json

      - name: Generate JSON snapshot
        run: |
          # Генерируем JSON без сложного парсинга gitignore (используем git ls-files + find)
          git ls-files --cached --exclude-standard > tracked_files.txt
          find . -type f \
            -not -path '*/.git/*' \
            -not -path './.git' \
            -not -name '*.log' \
            -not -path '*/node_modules/*' \
            -not -path '*/dist/*' \
            -not -path '*/build/*' \
            -print0 | xargs -0 > all_files.txt
          
          # Объединяем tracked + untracked, исключая дубли
          cat tracked_files.txt all_files.txt | sort -u > files_list.txt
          
          echo '{"commit": "'$(git rev-parse HEAD)'", "branch": "'$(git branch --show-current)'", "files": []}' > project-snapshot.json
          
          while IFS= read -r file; do
            rel_path="./$file"
            if [ -f "$rel_path" ]; then
              size=$(stat -c%s "$rel_path" 2>/dev/null || echo 0)
              if [ "$size" -lt 1000000 ]; then
                content=$(cat "$rel_path" 2>/dev/null | base64 -w0 || echo "[Error]")
              else
                content="[Large file >1MB]"
              fi
              jq --arg path "$file" --arg content "$content" --arg size "$size" \
                '.files += [{path: $path, size: ($size | tonumber), content: $content}]' \
                project-snapshot.json > tmp.json && mv tmp.json project-snapshot.json
            fi
          done < files_list.txt
          
          rm -f *.txt tmp.json

      - name: Generate MD dump
        run: |
          echo "# Полный снапшот проекта для LLM" > project-snapshot.md
          echo "## Commit: $(git rev-parse HEAD)" >> project-snapshot.md
          echo "## Branch: $(git branch --show-current)" >> project-snapshot.md
          echo "## Дата: $(date)" >> project-snapshot.md
          echo "## Файлов: $(jq '.files | length' project-snapshot.json)" >> project-snapshot.md
          echo "" >> project-snapshot.md
          tree -I '.git|node_modules|dist|build|*.log' -a >> project-snapshot.md
          echo "" >> project-snapshot.md
          jq -r '.files[] | "## (.path) (размер: (.size | tonumber) bytes)
```
(.content | @base64d)
```
"' project-snapshot.json | sed 's/[Large.*/[Large file]/; s/[Binary.*/[Binary file]/' >> project-snapshot.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-snapshot-${{ github.sha }}
          path: |
            project-snapshot.json
            project-snapshot.md
            tree.json
          retention-days: 30

      - name: Commit to repo (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "snapshots/" >> .gitignore
          mkdir -p snapshots
          mv project-snapshot.* snapshots/ || true
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .gitignore snapshots/ || true
          git commit -m "Add project snapshot [skip ci]" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
