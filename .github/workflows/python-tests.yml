name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Устанавливаем только то, что нужно для тестов.
      # НЕ делаем pip install -e . / pip install . — это исключает
      # появление установленного пакета, который затенял бы исходники.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.0.2 \
            pytest-asyncio==0.23.5 \
            pydantic==2.5.3 \
            pydantic-settings==2.1.0 \
            aiofiles \
            aiohttp

      # Параноидальная очистка: убираем любые stale-установки и байт-код.
      # find ... || true — не роняем шаг если каталогов нет.
      - name: Purge stale installations and caches
        run: |
          pip uninstall -y app Alex-Nano-Bot || true
          find . -type d -name "__pycache__" -exec rm -rf {} + || true
          find . -type d -name "*.egg-info"  -exec rm -rf {} + || true
          find . -name "*.pyc" -delete       || true

      # Диагностика: убеждаемся, что нужные символы есть в исходниках.
      - name: Verify source state
        run: |
          echo "=== skills_loader exports ==="
          grep -n "class OpenClawExecutor\|class ToolError" app/core/skills_loader.py \
            || { echo "FATAL: OpenClawExecutor/ToolError not found in source!"; exit 1; }

          echo "=== pytest.ini markers ==="
          grep "integration" pytest.ini \
            || { echo "FATAL: integration marker missing from pytest.ini!"; exit 1; }

          echo "=== sys.path will be ==="
          PYTHONPATH=. python -c "import sys; [print(p) for p in sys.path]"

      # conftest.py регистрирует заглушку app.core.skills_loader без
      # OpenClawExecutor/ToolError, поэтому test_mfdba_core.py должен
      # запускаться в изолированном процессе ДО загрузки conftest.py.
      #
      # Стратегия: две отдельные команды pytest.
      #
      # 1) Тесты MFDBA Core — без conftest (--noconftest).
      #    conftest.py ставит заглушку на skills_loader; эти тесты
      #    импортируют реальный модуль напрямую — конфликт.
      - name: Run MFDBA Core tests (isolated, no conftest)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_mfdba_core.py \
            --noconftest \
            --asyncio-mode=auto \
            -v

      # 2) Остальные тесты — с conftest (заглушки нужны для bot/runtime).
      - name: Run remaining tests (with conftest stubs)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --ignore=tests/test_mfdba_core.py \
            --asyncio-mode=auto \
            -v
