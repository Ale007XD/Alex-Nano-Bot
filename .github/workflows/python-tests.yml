name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pydantic
        
    - name: Run MFDBA Core & Runtime Tests
      run: |
        # Запуск с автоматическим режимом asyncio для детерминированности
        pytest tests/test_mfdba_core.py tests/test_runtime.py -v --asyncio-mode=auto
