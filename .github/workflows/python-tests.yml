name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pydantic
        # Защита: устанавливаем requirements только если файл существует
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run MFDBA Core Tests
      env:
        # Критически важно: указываем Python искать модули начиная с корня
        PYTHONPATH: .
      run: |
        # Запускаем целиком папку tests/. Это защитит от падения, 
        # если конкретный файл еще не создан.
        pytest tests/ -v --asyncio-mode=auto
