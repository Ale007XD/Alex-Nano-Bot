name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Устанавливаем только то, что нужно для тестов.
      # НЕ делаем pip install -e . — исключает stale-установку пакета app.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.0.2 \
            pytest-asyncio==0.23.5 \
            pydantic==2.5.3 \
            pydantic-settings==2.1.0 \
            aiofiles \
            aiohttp

      # Убираем остатки предыдущих установок и байт-код
      - name: Purge stale installations and caches
        run: |
          pip uninstall -y app Alex-Nano-Bot || true
          find . -type d -name "__pycache__" -exec rm -rf {} + || true
          find . -type d -name "*.egg-info"  -exec rm -rf {} + || true
          find . -name "*.pyc" -delete || true

      # Верифицируем, что нужные символы есть в исходниках
      - name: Verify source state
        run: |
          echo "=== skills_loader exports ==="
          grep -n "class OpenClawExecutor\|class ToolError" app/core/skills_loader.py \
            || { echo "FATAL: OpenClawExecutor/ToolError not found!"; exit 1; }
          echo "=== pytest.ini markers ==="
          grep "integration" pytest.ini \
            || { echo "FATAL: integration marker missing!"; exit 1; }

      # Копируем специализированный conftest для test_mfdba_core.py.
      #
      # Почему отдельный файл, а не основной conftest.py:
      #   - основной conftest.py заглушает app.core.skills_loader целиком
      #     (без OpenClawExecutor/ToolError) — это нужно для test_bot.py
      #     и test_runtime.py, которым реальный skills_loader не нужен.
      #   - test_mfdba_core.py тестирует именно реальный OpenClawExecutor,
      #     поэтому нужен conftest БЕЗ заглушки skills_loader,
      #     но С заглушками всего остального (config, database, memory…).
      - name: Install conftest for MFDBA Core tests
        run: |
          cp conftest_mfdba.py tests/conftest_mfdba.py

      # Шаг 1: тесты MFDBA Core с изолированным conftest.
      - name: Run MFDBA Core tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_mfdba_core.py \
            -p tests.conftest_mfdba \
            --noconftest \
            --asyncio-mode=auto \
            --override-ini="addopts=" \
            -v

      # Шаг 2: остальные тесты с основным conftest.py
      - name: Run remaining tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --ignore=tests/test_mfdba_core.py \
            --asyncio-mode=auto \
            -v
