name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Purge stale caches and installations
      run: |
        # Ваше решение: удаляем возможные старые установки пакета app
        pip uninstall -y app Alex-Nano-Bot || true
        # Удаляем кэш метаданных и байт-кода
        find . -type d -name "__pycache__" -exec rm -rf {} +
        find . -type d -name "*.egg-info" -exec rm -rf {} +

    - name: Run MFDBA Core Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v --asyncio-mode=auto
