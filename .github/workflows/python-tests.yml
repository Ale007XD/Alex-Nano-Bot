name: MFDBA v1.5.0 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Устанавливаем только то, что нужно для тестов.
      # НЕ делаем pip install -e . — исключает stale-установку пакета app.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.0.2 \
            pytest-asyncio==0.23.5 \
            pydantic==2.5.3 \
            pydantic-settings==2.1.0 \
            aiofiles \
            aiohttp \
            httpx==0.27.0

      # Убираем остатки предыдущих установок и байт-код
      - name: Purge stale installations and caches
        run: |
          pip uninstall -y app Alex-Nano-Bot || true
          find . -type d -name "__pycache__" -exec rm -rf {} + || true
          find . -type d -name "*.egg-info"  -exec rm -rf {} + || true
          find . -name "*.pyc" -delete || true

      # Верифицируем, что нужные символы есть в исходниках
      - name: Verify source state
        run: |
          echo "=== skills_loader exports ==="
          grep -n "class OpenClawExecutor\|class ToolError" app/core/skills_loader.py \
            || { echo "FATAL: OpenClawExecutor/ToolError not found!"; exit 1; }
          echo "=== pytest.ini markers ==="
          grep "integration" pytest.ini \
            || { echo "FATAL: integration marker missing!"; exit 1; }

      # conftest_mfdba.py лежит в корне репо.
      # Копируем в tests/ чтобы -p tests.conftest_mfdba его нашёл.
      - name: Install MFDBA conftest
        run: cp conftest_mfdba.py tests/conftest_mfdba.py

      # ── Шаг 1: тесты MFDBA Core ──────────────────────────────────────────
      # Используем --noconftest чтобы основной conftest.py не заглушил
      # реальный skills_loader. Вместо него подключаем conftest_mfdba
      # через -p (plugin), который загружает реальный skills_loader
      # через importlib.util в обход __init__ cascade.
      - name: Run MFDBA Core tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_mfdba_core.py \
            -p tests.conftest_mfdba \
            --noconftest \
            --asyncio-mode=auto \
            --override-ini="addopts=" \
            -v

      # ── Шаг 2: остальные тесты с основным conftest.py ───────────────────
      - name: Run remaining tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --ignore=tests/test_mfdba_core.py \
            --asyncio-mode=auto \
            -v
